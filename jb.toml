name = "jb"
type = "cli"

[platform.linux]
download-file = "jb-linux-{arch}"

[platform.macos]
download-file = "jb-darwin-{arch}"

[install]
download-url = "https://github.com/jsonnet-bundler/jsonnet-bundler/releases/download/v{version}/{download_file}"
unpack = false

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[resolve]
git-url = "https://github.com/jsonnet-bundler/jsonnet-bundler"
git-tag-pattern = "^v(\\d+\\.\\d+\\.\\d+)$"
