name = "tanka"
type = "cli"

[platform.linux]
download-file = "tk-linux-{arch}"

[platform.macos]
download-file = "tk-darwin-{arch}"

[install]
download-url = "https://github.com/grafana/tanka/releases/download/v{version}/{download_file}"
unpack = false

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[resolve]
git-url = "https://github.com/grafana/tanka"
git-tag-pattern = "^v(\\d+\\.\\d+\\.\\d+)$"
